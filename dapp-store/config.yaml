  catalog:
    en-US:
      name: "Glimpse"
      short_description: "Zero platform fees. Real impact. Every dollar on-chain."
      long_description: "Most people's entire lives will be forever changed by a few thousand dollars. Glimpse makes sure every one of those dollars actually arrives.\n\nGlimpse is a USDC donation app where 100% of what you give goes toward helping people in need. No platform fees. Every transaction is recorded on the Solana blockchain so you can verify it yourself.\n\nWhen you donate, you can describe who you want to help and leave a personal note. Glimpse uses that context to match your donation to a specific person or cause. A message thread opens immediately so you can communicate directly and follow the impact of your gift.\n\nHow it works:\n1. Connect your Seeker wallet\n2. Pick a campaign and enter any USDC amount\n3. Add match context and a note for the recipient\n4. Review the details and sign\n5. Follow real updates in your message thread\n\nZero platform fees. Built on Solana for the Seeker community. Glimpse is not a nonprofit or 501(c)(3). Donations are not tax-deductible."
      new_in_version: "First release. Direct USDC giving with on-chain transparency and impact messaging."
  android_details:
    locales:
      - en-US

solana_mobile_dapp_publisher_portal:
  google_store_package: "com.seekerdapp"
  testing_instructions: "1. Open the app and tap the Give button.\n2. Connect your Seeker wallet when prompted.\n3. Enter any USDC amount and select a campaign.\n4. Optionally add match context and a note.\n5. Tap Review Donation, then Confirm and Sign in your wallet.\n6. Verify the donation appears in the Glimpses tab with CONFIRMED status.\n7. Verify a message thread appears in the Messages tab."
