  catalog:
    en-US:
      name: "Glimpse"
      short_description: "USDC donations, real updates."
      long_description: "Glimpse is a USDC donation app on Solana built for transparent giving.\n\nEvery donation is recorded on-chain and tied to a message thread so donors can follow what happened after they gave.\n\nHow it works:\n1. Open Give\n2. Enter USDC amount and choose a campaign\n3. Add optional context and an optional note\n4. Review and confirm\n5. Sign in your wallet\n6. Track updates in Messages\n\nAfter donation, your message thread opens immediately. In 24-48 hours, Glimpse follows up with a specific need match. In 5-7 days, donors receive receipts, photos, and progress updates.\n\nCampaign minimums apply by campaign (currently 10-25 USDC). Built on Solana for fast settlement and verifiable on-chain records."
      new_in_version: "First release. Donate USDC, sign in-wallet, and follow real impact updates in-app."
  android_details:
    locales:
      - en-US

solana_mobile_dapp_publisher_portal:
  google_store_package: "com.seekerdapp"
  testing_instructions: "1. Connect a Solana wallet with USDC balance (e.g., Phantom or Solflare).\n2. Tap the Give tab.\n3. Select a campaign and enter a USDC amount of at least the campaign minimum.\n4. Tap Review Donation, then Confirm and Sign in wallet.\n5. Verify the conversation thread appears in the Messages tab with the welcome timeline."
